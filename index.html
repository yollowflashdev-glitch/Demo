        <button class="btn-social btn-social--github" type="button" id="btn-github" aria-label="Continue with GitHub">
          <svg class="btn-social__icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" fill="currentColor"/>
          </svg>
          <span>Continue with GitHub</span>
        </button>
      </div>

      <!-- Divider -->
      <div class="divider" role="separator" aria-label="or sign in with email">
        <span class="divider__line" aria-hidden="true"></span>
        <span class="divider__text">or sign in with email</span>
        <span class="divider__line" aria-hidden="true"></span>
      </div>

      <!-- ======================================================
           LOGIN FORM
      ====================================================== -->
      <form class="form" id="login-form" novalidate aria-label="Email login form">

        <!-- Email Field -->
        <div class="field" id="field-email">
          <label class="field__label" for="email">
            Email Address
          </label>
          <div class="field__wrap">
            <span class="field__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <input
              class="field__input"
              type="email"
              id="email"
              name="email"
              placeholder="hero@marvel.com"
              autocomplete="email"
              spellcheck="false"
              required
              aria-describedby="email-error"
              aria-required="true"
            />
            <span class="field__focus-ring" aria-hidden="true"></span>
          </div>
          <span class="field__error" id="email-error" role="alert" aria-live="polite"></span>
        </div>

        <!-- Password Field -->
        <div class="field" id="field-password">
          <label class="field__label" for="password">
            Password
          </label>
          <div class="field__wrap">
            <span class="field__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              class="field__input"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••••••"
              autocomplete="current-password"
              required
              aria-describedby="password-error"
              aria-required="true"
            />
            <!-- Show/Hide Toggle -->
            <button
              class="field__toggle"
              type="button"
              id="password-toggle"
              aria-label="Show password"
              aria-pressed="false"
              aria-controls="password"
            >
              <!-- Eye open -->
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              <!-- Eye closed -->
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <span class="field__focus-ring" aria-hidden="true"></span>
          </div>
          <span class="field__error" id="password-error" role="alert" aria-live="polite"></span>
        </div>

        <!-- Form Options Row -->
        <div class="form__options">
          <!-- Remember Me -->
          <label class="checkbox" for="remember">
            <input
              class="checkbox__input"
              type="checkbox"
              id="remember"
              name="remember"
              aria-label="Remember me on this device"
            />
            <span class="checkbox__custom" aria-hidden="true">
              <svg class="checkbox__check" viewBox="0 0 12 9" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="checkbox__label">Remember me</span>
          </label>

          <!-- Forgot Password -->
          <a href="#" class="forgot-link" id="forgot-link" aria-label="Reset your forgotten password">
            Forgot password?
          </a>
        </div>

        <!-- Submit Button -->
        <button class="btn-submit" type="submit" id="btn-submit" aria-label="Sign in to your account">
          <span class="btn-submit__text">Sign In</span>
          <span class="btn-submit__loader" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
              <path d="M12 2a10 10 0 0 1 10 10" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="btn-submit__arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 12h14M12 5l7 7-7 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <!-- Web-shoot particle burst on click -->
          <span class="btn-submit__burst" aria-hidden="true"></span>
        </button>

        <!-- Sign up link -->
        <p class="form__signup">
          New hero?
          <a href="#" class="form__signup-link" aria-label="Create a new account">
            Create your account →
          </a>
        </p>

      </form>

    </article>
    <!-- /card -->

  </main>

  <!-- ============================================================
       SUCCESS OVERLAY
  ============================================================ -->
  <div class="success-overlay" id="success-overlay" role="dialog" aria-modal="true" aria-label="Login successful" aria-hidden="true">
    <div class="success-overlay__inner">
      <svg class="success-overlay__web" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(230,22,45,0.3)" stroke-width="1"/>
        <circle cx="100" cy="100" r="60" fill="none" stroke="rgba(230,22,45,0.2)" stroke-width="1"/>
        <circle cx="100" cy="100" r="30" fill="none" stroke="rgba(230,22,45,0.3)" stroke-width="1"/>
        <line x1="100" y1="10" x2="100" y2="190" stroke="rgba(230,22,45,0.2)" stroke-width="1"/>
        <line x1="10" y1="100" x2="190" y2="100" stroke="rgba(230,22,45,0.2)" stroke-width="1"/>
        <line x1="36" y1="36" x2="164" y2="164" stroke="rgba(230,22,45,0.15)" stroke-width="1"/>
        <line x1="164" y1="36" x2="36" y2="164" stroke="rgba(230,22,45,0.15)" stroke-width="1"/>
      </svg>
      <div class="success-overlay__icon" aria-hidden="true">✓</div>
      <h2 class="success-overlay__title">Welcome, Hero.</h2>
      <p class="success-overlay__msg">Your identity is confirmed. Entering the portal…</p>
    </div>
  </div>

  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->
  <script src="js/particles.js"></script>
  <script src="js/spiderman.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
